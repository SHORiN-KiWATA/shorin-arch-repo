name: Update Repository Database

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm aws-cli sudo

      - name: Configure GPG
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent 2>/dev/null || true

      - name: Download existing database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p /work /tmp/newpkgs
          cp "${GITHUB_WORKSPACE}/pkglist" /work/pkglist
          cd /work
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          aws s3 cp ${BUCKET}/shorin-arch.db.tar.zst ./shorin-arch.db.tar.zst ${ENDPOINT} \
            || echo "WARN: No existing db, will create new one"
          aws s3 cp ${BUCKET}/shorin-arch.db.tar.zst.sig ./shorin-arch.db.tar.zst.sig ${ENDPOINT} \
            || echo "WARN: No existing db sig"
          aws s3 cp ${BUCKET}/shorin-arch.files.tar.zst ./shorin-arch.files.tar.zst ${ENDPOINT} \
            || echo "WARN: No existing files db, will create new one"
          aws s3 cp ${BUCKET}/shorin-arch.files.tar.zst.sig ./shorin-arch.files.tar.zst.sig ${ENDPOINT} \
            || echo "WARN: No existing files db sig"

      - name: List packages on R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          aws s3 ls ${BUCKET}/ ${ENDPOINT} --recursive \
            | awk '{print $4}' \
            | grep -E '\.pkg\.tar\.zst$' \
            | xargs -n1 basename \
            | sort -u > /work/r2-packages.txt

          echo "Found $(wc -l < /work/r2-packages.txt) packages on R2"

      - name: Parse existing database entries
        run: |
          cd /work
          DB="shorin-arch.db.tar.zst"

          if [ ! -f "$DB" ]; then
            echo "No existing database, all packages are new"
            : > /work/db-entries.txt
            : > /work/db-filenames.txt
            exit 0
          fi

          tar -xOf "$DB" --wildcards '*/desc' 2>/dev/null \
            | awk '
                /^%NAME%/     { getline name; next }
                /^%VERSION%/  { getline ver; next }
                /^%FILENAME%/ { next }
                /^$/          {
                    if (name != "" && ver != "") {
                        print name " " ver
                        name=""; ver=""
                    }
                    next
                }
                END {
                    if (name != "" && ver != "")
                        print name " " ver
                }
              ' \
            | sort -u > /work/db-entries.txt

          # Parse filename mapping separately
          tar -xOf "$DB" --wildcards '*/desc' 2>/dev/null \
            | awk '
                /^%NAME%/     { getline name; next }
                /^%FILENAME%/ { getline fname; next }
                /^$/          {
                    if (name != "" && fname != "") {
                        print name " " fname
                        name=""; fname=""
                    }
                    next
                }
                END {
                    if (name != "" && fname != "")
                        print name " " fname
                }
              ' \
            | sort -u > /work/db-filenames.txt

          echo "Database has $(wc -l < /work/db-entries.txt) entries"

      - name: Check if update is needed
        id: check
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          cd /work
          NEED_UPDATE=false
          REASON=""

          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          # --- Check 1: Signature validity ---
          if [ -f shorin-arch.db.tar.zst.sig ] && [ -f shorin-arch.db.tar.zst ]; then
            if ! gpg --verify shorin-arch.db.tar.zst.sig shorin-arch.db.tar.zst 2>/dev/null; then
              NEED_UPDATE=true
              REASON="db signature invalid or missing"
            fi
          else
            NEED_UPDATE=true
            REASON="db signature file or db file missing"
          fi

          if [ -f shorin-arch.files.tar.zst.sig ] && [ -f shorin-arch.files.tar.zst ]; then
            if ! gpg --verify shorin-arch.files.tar.zst.sig shorin-arch.files.tar.zst 2>/dev/null; then
              NEED_UPDATE=true
              REASON="$REASON; files signature invalid or missing"
            fi
          else
            NEED_UPDATE=true
            REASON="$REASON; files signature or files db missing"
          fi

          # --- Check 2: Package changes (new or updated packages) ---
          declare -A DB_VER
          while read -r name ver; do
            [ -n "$name" ] && DB_VER["$name"]="$ver"
          done < /work/db-entries.txt

          > /work/changed-packages.txt

          while read -r pkgfile; do
            [ -z "$pkgfile" ] && continue

            base="${pkgfile%.pkg.tar.zst}"
            arch="${base##*-}"
            base="${base%-*}"
            rel="${base##*-}"
            base="${base%-*}"
            pkgver="${base##*-}"
            pkgname="${base%-*}"

            db_ver="${DB_VER[$pkgname]:-}"

            if [ -z "$db_ver" ]; then
              echo "NEW: $pkgname $pkgver ($pkgfile)"
              echo "$pkgfile" >> /work/changed-packages.txt
              NEED_UPDATE=true
              REASON="$REASON; new package $pkgname"
            else
              if [ "$(vercmp "$pkgver" "$db_ver")" -gt 0 ]; then
                echo "UPDATE: $pkgname $db_ver -> $pkgver ($pkgfile)"
                echo "$pkgfile" >> /work/changed-packages.txt
                NEED_UPDATE=true
                REASON="$REASON; updated $pkgname"
              fi
            fi
          done < /work/r2-packages.txt

          # --- Check 3: Orphaned db entries ---
          > /work/orphan-names.txt
          PKGLIST_NAMES=$(grep -v '^#' pkglist | grep -v '^$' | sort -u)

          # Build pkgname -> filename mapping from db
          declare -A DB_FILENAMES
          while read -r db_fname_name db_fname_file; do
            [ -n "$db_fname_name" ] && DB_FILENAMES["$db_fname_name"]="$db_fname_file"
          done < /work/db-filenames.txt

          # Build R2 pkgname set
          declare -A R2_PKG_NAMES
          while read -r pkgfile; do
            [ -z "$pkgfile" ] && continue
            base="${pkgfile%.pkg.tar.zst}"
            arch="${base##*-}"
            base="${base%-*}"
            rel="${base##*-}"
            base="${base%-*}"
            pkgver="${base##*-}"
            pkgname="${base%-*}"
            R2_PKG_NAMES["$pkgname"]=1
          done < /work/r2-packages.txt

          # Check 3a: db entry not in pkglist → repo-remove (db only, R2 files cleaned by stale cleanup)
          while read -r db_name db_ver; do
            [ -z "$db_name" ] && continue
            if ! echo "$PKGLIST_NAMES" | grep -qx "$db_name"; then
              echo "ORPHAN DB ENTRY (not in pkglist): $db_name"
              echo "$db_name" >> /work/orphan-names.txt
              NEED_UPDATE=true
              REASON="$REASON; orphaned db entry $db_name"
            fi
          done < /work/db-entries.txt

          # Check 3b: db entry in pkglist but R2 file missing → verify then repo-remove
          while read -r db_name db_ver; do
            [ -z "$db_name" ] && continue
            # Skip already marked by 3a
            grep -qx "$db_name" /work/orphan-names.txt 2>/dev/null && continue
            # Only check packages in pkglist
            echo "$PKGLIST_NAMES" | grep -qx "$db_name" || continue
            # Check if in R2 listing
            if [ -z "${R2_PKG_NAMES[$db_name]}" ]; then
              db_file="${DB_FILENAMES[$db_name]:-}"
              if [ -n "$db_file" ]; then
                if aws s3 ls "${BUCKET}/${db_file}" ${ENDPOINT} >/dev/null 2>&1; then
                  echo "WARN: $db_name missing from R2 listing but file exists, skipping removal"
                  continue
                fi
              fi
              echo "ORPHAN DB ENTRY (file not found on R2): $db_name"
              echo "$db_name" >> /work/orphan-names.txt
              NEED_UPDATE=true
              REASON="$REASON; orphaned db entry $db_name"
            fi
          done < /work/db-entries.txt

          ORPHAN_COUNT=$(wc -l < /work/orphan-names.txt 2>/dev/null || echo 0)
          echo "Orphaned db entries: $ORPHAN_COUNT"

          CHANGED_COUNT=$(wc -l < /work/changed-packages.txt)
          echo "Changed packages: $CHANGED_COUNT"
          echo "Need update: $NEED_UPDATE"
          echo "Reason: $REASON"

          if [ "$NEED_UPDATE" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Download changed packages
        if: steps.check.outputs.needs_update == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          cd /work
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          # Download ALL packages if db doesn't exist yet (fresh build)
          if [ ! -f shorin-arch.db.tar.zst ]; then
            echo "No existing db, downloading all packages..."
            while read -r pkgfile; do
              [ -z "$pkgfile" ] && continue
              aws s3 cp "${BUCKET}/${pkgfile}" "/tmp/newpkgs/${pkgfile}" ${ENDPOINT}
            done < /work/r2-packages.txt
          else
            while read -r pkgfile; do
              [ -z "$pkgfile" ] && continue
              echo "Downloading: $pkgfile"
              aws s3 cp "${BUCKET}/${pkgfile}" "/tmp/newpkgs/${pkgfile}" ${ENDPOINT}
            done < /work/changed-packages.txt
          fi

          echo "Downloaded $(ls /tmp/newpkgs/*.pkg.tar.zst 2>/dev/null | wc -l) packages"

      - name: Update and sign database
        if: steps.check.outputs.needs_update == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          cd /work
          rm -f *.old

          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          # Remove orphaned db entries first
          if [ -f /work/orphan-names.txt ] && [ -s /work/orphan-names.txt ]; then
            ORPHAN_NAMES=$(cat /work/orphan-names.txt | tr '\n' ' ')
            echo "Removing orphaned db entries: $ORPHAN_NAMES"
            repo-remove shorin-arch.db.tar.zst $ORPHAN_NAMES
          fi

          # If no changed packages but sig was bad, we still need to re-sign
          # In that case there are no packages to repo-add, just re-sign existing db
          if ls /tmp/newpkgs/*.pkg.tar.zst >/dev/null 2>&1; then
            repo-add shorin-arch.db.tar.zst /tmp/newpkgs/*.pkg.tar.zst
          else
            echo "No new packages to add, just re-signing existing database"
          fi

          # Clean up stale package files on R2 (not referenced by updated db)
          echo "Checking for stale package files on R2..."
          PKGLIST_NAMES=$(grep -v '^#' pkglist | grep -v '^$' | sort -u)
          DB_FILES=$(tar -xOf shorin-arch.db.tar.zst --wildcards '*/desc' 2>/dev/null \
            | awk '
                /^%FILENAME%/ { getline fname; next }
                /^$/          { if (fname != "") { print fname; fname="" } next }
                END           { if (fname != "") print fname }
              ' \
            | sort -u)

          R2_PKG_FILES=$(aws s3 ls ${BUCKET}/ ${ENDPOINT} --recursive \
            | awk '{print $4}' \
            | xargs -n1 basename \
            | grep -E '\.pkg\.tar\.zst$' \
            | sort -u)

          STALE_COUNT=0
          while read -r r2_pkg; do
            [ -z "$r2_pkg" ] && continue
            if ! echo "$DB_FILES" | grep -qx "$r2_pkg"; then
              r2_pkgname=$(echo "$r2_pkg" | sed -E 's/-[^-]+-[^-]+-[^-]+\.pkg\.tar\.zst$//')
              # Only delete if not in pkglist (protect against incomplete db parsing)
              if ! echo "$PKGLIST_NAMES" | grep -qx "$r2_pkgname"; then
                echo "  STALE: $r2_pkg"
                aws s3 rm "${BUCKET}/${r2_pkg}" ${ENDPOINT} 2>/dev/null || true
                aws s3 rm "${BUCKET}/${r2_pkg}.sig" ${ENDPOINT} 2>/dev/null || true
                STALE_COUNT=$((STALE_COUNT + 1))
              else
                echo "  WARN: $r2_pkg not in db but pkgname in pkglist, keeping"
              fi
            fi
          done <<< "$R2_PKG_FILES"
          echo "Stale files removed: $STALE_COUNT"

          # Sign database files
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --no-armor shorin-arch.db.tar.zst
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$GPG_PASSPHRASE" \
            --detach-sign --no-armor shorin-arch.files.tar.zst

          # Create no-suffix copies
          for f in shorin-arch.db shorin-arch.files; do
            if [ -L "$f" ]; then
              target=$(readlink -f "$f")
              rm -f "$f"
              cp "$target" "$f"
            elif [ ! -f "$f" ]; then
              cp "${f}.tar.zst" "$f"
            fi
          done
          for f in shorin-arch.db.sig shorin-arch.files.sig; do
            if [ -L "$f" ]; then
              target=$(readlink -f "$f")
              rm -f "$f"
              cp "$target" "$f"
            elif [ ! -f "$f" ]; then
              cp "${f%.sig}.tar.zst.sig" "$f" 2>/dev/null || true
            fi
          done

          # Verify signatures before uploading
          echo "Verifying db.tar.zst signature..."
          gpg --verify shorin-arch.db.tar.zst.sig shorin-arch.db.tar.zst
          echo "Verifying files.tar.zst signature..."
          gpg --verify shorin-arch.files.tar.zst.sig shorin-arch.files.tar.zst

          rm -f *.old

      - name: Upload database to R2
        if: steps.check.outputs.needs_update == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          cd /work
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          for f in \
            shorin-arch.db.tar.zst \
            shorin-arch.db.tar.zst.sig \
            shorin-arch.files.tar.zst \
            shorin-arch.files.tar.zst.sig \
            shorin-arch.db \
            shorin-arch.db.sig \
            shorin-arch.files \
            shorin-arch.files.sig; do
            if [ -f "$f" ]; then
              echo "Uploading: $f"
              aws s3 cp "$f" "${BUCKET}/${f}" ${ENDPOINT} --cache-control 'max-age=0'
            fi
          done

          echo "Database update complete."
