name: Auto Build Packages

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  auto-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        shell: bash
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm aws-cli sudo git jq go
          useradd -m builder
          mkdir -p /etc/sudoers.d
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder
          mkdir -p /work /release
          chown -R builder:builder /work /release

          # Install yay from AUR (must run as non-root)
          sudo -u builder git clone https://aur.archlinux.org/yay.git /tmp/yay
          chown -R builder:builder /tmp/yay
          sudo -u builder bash -c 'cd /tmp/yay && makepkg -si --noconfirm --needed'
          cd /
          rm -rf /tmp/yay

          # Configure yay for non-interactive use
          sudo -u builder yay --save --answerclean All --answerdiff None --answeredit None --noeditmenu --nodiffmenu 2>/dev/null || true

      - name: Configure GPG
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export GNUPGHOME=/root/.gnupg
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "allow-loopback-pinentry" > "$GNUPGHOME/gpg-agent.conf"
          gpgconf --kill gpg-agent 2>/dev/null || true

      - name: Download R2 database and parse versions
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"

          aws s3 cp ${BUCKET}/shorin-arch.db.tar.zst /work/shorin-arch.db.tar.zst ${ENDPOINT} \
            || echo "WARN: No existing db"

          if [ -f /work/shorin-arch.db.tar.zst ]; then
            tar -xOf /work/shorin-arch.db.tar.zst --wildcards '*/desc' 2>/dev/null \
              | awk '
                  /^%NAME%/    { getline name; next }
                  /^%VERSION%/ { getline ver; next }
                  /^$/         {
                      if (name != "" && ver != "") {
                          print name " " ver
                          name=""; ver=""
                      }
                      next
                  }
                  END {
                      if (name != "" && ver != "")
                          print name " " ver
                  }
                ' \
              | sort -u > /work/db-versions.txt
          else
            : > /work/db-versions.txt
          fi

          echo "Database versions:"
          cat /work/db-versions.txt

      - name: Query AUR RPC API
        shell: bash
        run: |
          PACKAGES=$(grep -v '^#' pkglist | grep -v '^$' | tr '\n' ' ')
          QUERY=""
          for pkg in $PACKAGES; do
            QUERY="${QUERY}arg[]=${pkg}&"
          done

          curl -s "https://aur.archlinux.org/rpc/?v=5&type=info&${QUERY}" > /work/aur-info.json

          RESULT_COUNT=$(jq '.resultcount' /work/aur-info.json)
          echo "AUR returned $RESULT_COUNT packages"

          jq -r '.results[] | "\(.Name) \(.Version) \(.PackageBase)"' /work/aur-info.json \
            | sort -u > /work/aur-versions.txt

          echo "AUR versions:"
          cat /work/aur-versions.txt

      - name: Detect and build packages
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: /root/.gnupg
        run: |
          set +e

          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BUCKET="s3://shorin-arch-repo/archlinux/x86_64"
          R2_PREFIX="${BUCKET}/"

          # Build db version lookup
          declare -A DB_VER
          while read -r name ver; do
            [ -n "$name" ] && DB_VER["$name"]="$ver"
          done < /work/db-versions.txt

          > /work/build-results.txt

          while read -r aur_name aur_ver aur_base; do
            [ -z "$aur_name" ] && continue

            echo ""
            echo "============================================"
            echo "Processing: $aur_name"
            echo "============================================"

            db_ver="${DB_VER[$aur_name]:-}"

            if [ -z "$db_ver" ]; then
              echo "  NEW (not in db)"
            fi

            if [[ "$aur_name" == *-git ]]; then
              # === -git package: clone + makepkg -o to compute actual version ===
              mkdir -p /work/build
              chown -R builder:builder /work/build

              cd /work/build
              if ! sudo -u builder yay -G -a "$aur_base" 2>&1; then
                echo "  FAILED: Could not clone $aur_base"
                echo "FAILED $aur_name (clone error)" >> /work/build-results.txt
                cd /work
                continue
              fi

              actual_dir="/work/build/${aur_base}"
              if [ ! -d "$actual_dir" ]; then
                actual_dir=$(find /work/build -maxdepth 1 -type d | tail -1)
              fi

              cd "$actual_dir"

              echo "  Checking version via makepkg -o..."
              sudo -u builder yay -B "$actual_dir" --noconfirm --mflags "-o" --answerclean All --answerdiff None 2>&1 | tail -5

              pkglist_output=$(sudo -u builder makepkg --packagelist 2>/dev/null)
              first_pkg=$(echo "$pkglist_output" | head -1)

              if [ -z "$first_pkg" ]; then
                echo "  ERROR: Could not get package list, marking for full build"
                full_ver=""
              else
                base_name=$(basename "$first_pkg" .pkg.tar.zst)
                tmp="${base_name%-*}"
                tmp="${tmp%-*}"
                computed_ver="${tmp##*-}"
                pkgrel=$(bash -c 'source PKGBUILD 2>/dev/null; echo "$pkgrel"' 2>/dev/null)
                [ -z "$pkgrel" ] && pkgrel="1"
                full_ver="${computed_ver}-${pkgrel}"
              fi

              if [ -n "$full_ver" ]; then
                echo "  Computed: $full_ver (DB: $db_ver)"
                if [ -n "$db_ver" ] && [ "$(vercmp "$full_ver" "$db_ver")" -le 0 ]; then
                  echo "  UP TO DATE"
                  cd /work
                  rm -rf "$actual_dir"
                  echo "SKIPPED $aur_name (up to date: $full_ver)" >> /work/build-results.txt
                  continue
                fi
                echo "  NEEDS REBUILD"
              fi
            else
              # === Non-git package: use RPC version directly, no clone needed ===
              if [ -n "$db_ver" ] && [ "$(vercmp "$aur_ver" "$db_ver")" -le 0 ]; then
                echo "  UP TO DATE: $aur_name"
                echo "SKIPPED $aur_name (up to date: $aur_ver)" >> /work/build-results.txt
                continue
              fi
              echo "  NEEDS REBUILD: $aur_name $db_ver -> $aur_ver"

              # Clone only when rebuild is needed
              mkdir -p /work/build
              chown -R builder:builder /work/build

              cd /work/build
              if ! sudo -u builder yay -G -a "$aur_base" 2>&1; then
                echo "  FAILED: Could not clone $aur_base"
                echo "FAILED $aur_name (clone error)" >> /work/build-results.txt
                cd /work
                continue
              fi

              actual_dir="/work/build/${aur_base}"
              if [ ! -d "$actual_dir" ]; then
                actual_dir=$(find /work/build -maxdepth 1 -type d | tail -1)
              fi

              cd "$actual_dir"
            fi

            # === Build phase (reuse same directory) ===
            echo "  Building..."
            if ! sudo -u builder yay -B "$actual_dir" --noconfirm --mflags "--skippgpcheck" --answerclean All --answerdiff None 2>&1 | tail -10; then
              echo "  FAILED: Build failed for $aur_name"
              echo "FAILED $aur_name (build error)" >> /work/build-results.txt
              cd /work
              rm -rf "$actual_dir"
              continue
            fi

            # Find built packages
            for pkgfile in *.pkg.tar.zst; do
              [ -f "$pkgfile" ] || continue

              # Extract version and compare with DB
              BASE_NAME=$(echo "$pkgfile" | sed -E 's/-[^-]+-[^-]+-[^-]+\.pkg\.tar\.zst$//')
              BUILT_VER=$(echo "$pkgfile" | sed -E 's/^.*-([^-]+-[^-]+)-[^-]+\.pkg\.tar\.zst$/\1/')
              built_pkgname=$(echo "$pkgfile" | sed -E 's/-[^-]+-[^-]+-[^-]+\.pkg\.tar\.zst$//')
              built_db_ver="${DB_VER[$built_pkgname]:-}"

              if [ -n "$built_db_ver" ] && [ "$(vercmp "$BUILT_VER" "$built_db_ver")" -le 0 ]; then
                echo "  SKIP: $pkgfile ($BUILT_VER <= db $built_db_ver)"
                echo "SKIPPED $built_pkgname (built $BUILT_VER <= db $built_db_ver)" >> /work/build-results.txt
                continue
              fi

              # Copy to release dir
              cp "$pkgfile" "/release/${pkgfile}"

              # Sign the package
              if ! gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign --no-armor "/release/${pkgfile}" 2>&1; then
                echo "  FAILED: GPG signing failed for $pkgfile, skipping upload"
                echo "FAILED $built_pkgname (signing error)" >> /work/build-results.txt
                continue
              fi

              echo "  Built and signed: $pkgfile (version: $BUILT_VER)"

              # Remove old versions on R2
              for R2_OBJ in $(aws s3 ls ${R2_PREFIX} ${ENDPOINT} | awk '{print $4}' | grep "\.pkg\.tar\.zst$"); do
                [ "$R2_OBJ" = "$pkgfile" ] && continue
                R2_BASE=$(echo "$R2_OBJ" | sed -E 's/-[^-]+-[^-]+-[^-]+\.pkg\.tar\.zst$//')
                [ "$R2_BASE" = "$BASE_NAME" ] || continue
                echo "  Removing old: $R2_OBJ"
                aws s3 rm "${R2_PREFIX}${R2_OBJ}" ${ENDPOINT}
                aws s3 rm "${R2_PREFIX}${R2_OBJ}.sig" ${ENDPOINT} 2>/dev/null || true
              done

              # Upload new package + sig
              aws s3 cp "/release/${pkgfile}" "${R2_PREFIX}${pkgfile}" ${ENDPOINT}
              aws s3 cp "/release/${pkgfile}.sig" "${R2_PREFIX}${pkgfile}.sig" ${ENDPOINT}

              echo "  Uploaded: $pkgfile + sig"
              echo "OK $built_pkgname ($pkgfile)" >> /work/build-results.txt
            done

            cd /work
            rm -rf "$actual_dir"

          done < /work/aur-versions.txt

          echo ""
          echo "=== Build Results ==="
          cat /work/build-results.txt

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Auto Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f /work/build-results.txt ] && [ -s /work/build-results.txt ]; then
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
            while read -r line; do
              echo "| ${line} |" >> $GITHUB_STEP_SUMMARY
            done < /work/build-results.txt
          else
            echo "**All packages up to date.**" >> $GITHUB_STEP_SUMMARY
          fi
